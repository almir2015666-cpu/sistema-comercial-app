workflows:
  ios-simulator-build:
    name: iOS - Build de teste (sem assinatura)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
    scripts:
      - name: Instalar dependências
        script: npm install
      - name: Build do app web + sync com projeto iOS
        script: npm run sync
      - name: Compilar para o Simulador (sem assinatura)
        script: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  ios-release:
    name: iOS - Build assinado + TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    integrations:
      app_store_connect: appstore_codemagic_admin
    environment:
      node: 22
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: "com.sistemacmh.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Instalar dependências
        script: npm install
      - name: Build do app web + sync com projeto iOS
        script: npm run sync
      - name: Criar/buscar certificado e perfil de distribuição
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Configurar assinatura automática
        script: xcode-project use-profiles
      # Versão e build automáticos, pra nunca esbarrar em "train version closed"
      # (erro 90186) nem em build repetido:
      #  - CFBundleVersion (build interno): timestamp, sempre único
      #  - CFBundleShortVersionString (versão): base MAJOR.MINOR lida do projeto
      #    + contador de commits como patch (ex.: 1.3.42). Sempre sobe, então a
      #    Apple nunca recusa por versão já aprovada. Pra um lançamento "de
      #    verdade" na App Store, basta subir o MAJOR.MINOR no project.pbxproj
      #    (1.3 -> 1.4) e o patch continua automático.
      - name: Definir versão e build automáticos
        script: |
          cd ios/App
          agvtool new-version -all $(date +%s)
          BASE=$(grep -m1 'MARKETING_VERSION' App.xcodeproj/project.pbxproj | sed -E 's/.*= *([0-9]+\.[0-9]+).*/\1/')
          if [ -z "$BASE" ]; then BASE="1.3"; fi
          COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "")
          if [ -z "$COUNT" ]; then COUNT=$(date +%y%m%d); fi
          echo "Versão de marketing: $BASE.$COUNT"
          agvtool new-marketing-version "$BASE.$COUNT"
      - name: Gerar .ipa assinado
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
